{% set name = "digitalearth" %}
{% set version = "0.5.0" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/serapeum-org/Digital-Earth/archive/{{ version }}.tar.gz
  sha256: 1d348c32d831da41c0e4843812ef292781242dfb1b6e95b0104e0707ed7e7def

build:
  number: 0
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=80.0.0
    - wheel
  run:
    - python >={{ python_min }}
    - numpy >=2.0.0
    - geopandas >=1.1.3
    - cleopatra >=0.17.0
    - pyramids >=0.32.0
    - loguru >=0.7.3
    - pyyaml >=6.0

test:
  requires:
    - python {{ python_min }}
    - pip
  imports:
    - digitalearth
    - digitalearth.scene
    - digitalearth.autostyle
  commands:
    - pip check
    - digitalearth --help

outputs:
  - name: {{ name }}

  - name: {{ name }}-3d
    build:
      noarch: python
    requirements:
      run:
        - {{ pin_subpackage(name, exact=True) }}
        # mirrors the PyPI ``digitalearth[3d]`` extra: the PyVista true-3D tier
        # (Scene3D) plus the textured-globe and animation backends.
        - pyvista >=0.48
        - trame >=3.13
        - trame-vtk >=2.8
        - trame-vuetify >=2.7
        - geovista >=0.5.3
        - imageio >=2.34
        - imageio-ffmpeg >=0.5
    test:
      imports:
        - digitalearth

about:
  home: https://github.com/serapeum-org/Digital-Earth
  license: GPL-3.0-only
  license_family: GPL3
  license_file: LICENSE.md
  summary: Geospatial visualization package for rasters and vector data
  description: |
    digitalearth is a geospatial visualization package: it plots rasters and
    vector data by wiring pyramids (GIS) data into cleopatra (matplotlib)
    glyphs. It provides maps and raster fields, point/cell and vector-field
    plots, unstructured meshes, composites, ensemble/temporal series,
    projected and globe maps, animations, charts, automatic field styling,
    and a batch / HTML-gallery / CLI delivery tier.
  dev_url: https://github.com/serapeum-org/Digital-Earth
  doc_url: https://serapeum-org.github.io/Digital-Earth

extra:
  recipe-maintainers:
    - MAfarrag
